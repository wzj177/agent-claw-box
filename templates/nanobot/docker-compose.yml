# nanobot Docker Compose 配置
# AgentBox 使用此文件进行 compose 部署

services:
  nanobot-gateway:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    command: >
      sh -c "uv pip install --system nanobot-ai && nanobot gateway"
    ports:
      - "${AGENTBOX_PORT_18790:-18790}:18790"
    volumes:
      - "${AGENTBOX_DATA_DIR:-.}/nanobot-data:/root/.nanobot"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/"]
      interval: 30s
      timeout: 5s
      retries: 3
