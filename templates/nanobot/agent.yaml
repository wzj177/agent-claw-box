name: nanobot
description: 多通道 AI 代理，支持 WhatsApp/Telegram/Discord/飞书/钉钉等 20+ 通道
version: "0.1.4"
enabled: false

install_method: compose

runtime:
  compose_file: docker-compose.yml

ports:
  - host: 18790
    container: 18790
  - host: 3001
    container: 3001

volumes:
  - host_suffix: nanobot-data
    container: /root/.nanobot

resources:
  cpus: 1
  memory_mb: 1024
  disk_gb: 5

health:
  url: http://localhost:18790/
  interval_secs: 30

config_schema:
  - key: llm_provider
    type: select
    label: "LLM 服务商"
    required: true
    options:
      - anthropic
      - openai
      - deepseek
      - dashscope
      - zhipu
      - moonshot
      - siliconflow
    default: anthropic
  - key: api_key
    type: secret
    label: "API Key"
    required: true
    env_name: ANTHROPIC_API_KEY
  - key: model
    type: string
    label: "模型名称"
    default: "anthropic/claude-sonnet-4-20250514"
