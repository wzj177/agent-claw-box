name: CoPaw
description: 阿里云个人 AI 助手，支持钉钉/飞书/QQ/Telegram 等多通道
version: "0.0.5"
enabled: false

install_method: docker

runtime:
  image: agentscope/copaw:latest
  # China mirror: agentscope-registry.ap-southeast-1.cr.aliyuncs.com/agentscope/copaw:latest

ports:
  - host: 8088
    container: 8088

volumes:
  - host_suffix: copaw-data
    container: /app/working

resources:
  cpus: 2
  memory_mb: 4096
  disk_gb: 10

health:
  url: http://localhost:8088/health
  interval_secs: 30

config_schema:
  - key: llm_provider
    type: select
    label: "LLM 服务商"
    required: true
    options:
      - dashscope
      - openai
      - deepseek
      - ollama
    default: dashscope
  - key: api_key
    type: secret
    label: "API Key"
    required: true
    env_name: DASHSCOPE_API_KEY
  - key: language
    type: select
    label: "语言"
    options:
      - zh
      - en
    default: zh
