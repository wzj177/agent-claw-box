name: OpenClaw
description: 全平台 AI 代理，支持 WhatsApp/Telegram/Discord 等通道，Web 控制面板
version: "latest"

install_method: native

runtime:
  install_cmd: |
    set -euo pipefail
    echo "Downloading agent installer..."
    curl -fL https://openclaw.ai/install.sh -o /tmp/openclaw-install.sh --connect-timeout 10 --max-time 120
    chmod +x /tmp/openclaw-install.sh
    echo "Running installer..."
    bash /tmp/openclaw-install.sh --no-onboard
    rm -f /tmp/openclaw-install.sh
    echo "Install finished"
  start_cmd: "openclaw gateway --port ${AGENTBOX_PORT:-18789} --bind loopback --allow-unconfigured"

ports:
  - host: 18789
    container: 18789

volumes:
  - host_suffix: openclaw-data
    container: /root/.openclaw

resources:
  cpus: 2
  memory_mb: 2048
  disk_gb: 5

health:
  url: http://localhost:18789/
  interval_secs: 30

config_schema:
  - key: llm_provider
    type: select
    label: "LLM 服务商"
    required: true
    options:
      - anthropic
      - openai
      - deepseek
      - ollama
      - openrouter
      - mistral
      - moonshot
      - qwen
    default: anthropic
  - key: api_key
    type: secret
    label: "API Key"
    required: true
  - key: model
    type: string
    label: "模型名称（provider/model 格式）"
    default: "anthropic/claude-sonnet-4-20250514"
  - key: base_url
    type: string
    label: "自定义 API 地址（仅 openrouter/自建服务需要）"
